# railway.toml — repo root
# Railway reads this file for EVERY service pointing at this repo.
# Root Directory is set per-service in the Railway dashboard
# (Settings → Build → Root Directory), which is what actually
# separates the api and frontend builds — not the dockerfilePath below.
#
# HOW TO SET UP IN RAILWAY DASHBOARD:
#
#  Service: api
#    Root Directory: backend
#    (Dockerfile is auto-detected at backend/Dockerfile)
#    Start Command (override):
#      sh -c "PYTHONPATH=/app uvicorn app.main:app --host 0.0.0.0 --port $PORT"
#    Health Check Path (override): /health
#
#  Service: frontend
#    Root Directory: frontend
#    (Dockerfile is auto-detected at frontend/Dockerfile)
#    Start Command (override):
#      sh -c "serve -s dist -l $PORT"
#    Env var: VITE_API_URL=<public api service URL>
#
# ──────────────────────────────────────────────────────────────────

[build]
builder = Dockerfile"

[deploy]
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
