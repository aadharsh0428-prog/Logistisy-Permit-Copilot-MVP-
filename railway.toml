# railway.toml — repo root
# Railway reads this file for EVERY service pointing at this repo.
# The correct build path and start command are selected per-service via
# the Railway dashboard (Settings → Build / Settings → Deploy), which
# override the [build] and [deploy] blocks below.
#
# HOW TO SET UP IN RAILWAY DASHBOARD:
#
#  Service: api
#    Root Directory: backend
#    Dockerfile Path (override): Dockerfile
#    Start Command (override):
#      sh -c "PYTHONPATH=/app uvicorn app.main:app --host 0.0.0.0 --port $PORT"
#    Health Check Path (override): /health
#
#    NOTE: Base.metadata.create_all(bind=engine) runs at import time in
#    app/main.py — no need to call it here.
#
#  Service: frontend
#    Root Directory: frontend
#    Dockerfile Path (override): Dockerfile
#    Start Command (override):
#      sh -c "serve -s dist -l $PORT"
#    Env var: VITE_API_URL=<public api service URL>
#
# ──────────────────────────────────────────────────────────────────

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c \"PYTHONPATH=/app uvicorn app.main:app --host 0.0.0.0 --port $PORT\""
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
