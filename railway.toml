[[services]]
name = "backend"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "frontend"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.frontend"

[services.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
